name = "vlinders-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

# KV命名空间 - API密钥存储
# 使用: npx wrangler kv:namespace create "API_KEYS"
# [[kv_namespaces]]
# binding = "API_KEYS"
# id = "your-kv-namespace-id"
# preview_id = "your-preview-kv-namespace-id"

# D1数据库 - 用户和使用量数据
# 使用: npx wrangler d1 create vlinders-db
# [[d1_databases]]
# binding = "DB"
# database_name = "vlinders-db"
# database_id = "your-database-id"

# R2存储 - 日志和文件存储
# 使用: npx wrangler r2 bucket create vlinders-logs
# [[r2_buckets]]
# binding = "LOGS"
# bucket_name = "vlinders-logs"

# 环境变量（敏感信息使用wrangler secret设置）
# 设置方法:
# npx wrangler secret put OPENAI_API_KEY
# npx wrangler secret put ANTHROPIC_API_KEY

# 开发环境配置
[env.development]
vars = { ENVIRONMENT = "development" }

# 生产环境配置
[env.production]
vars = { ENVIRONMENT = "production" }

# 限制和配额
[limits]
cpu_ms = 50000

# 路由配置（部署后配置）
# [[routes]]
# pattern = "api.vlinders.org/*"
# zone_name = "vlinders.org"
